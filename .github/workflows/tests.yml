---
name: Tests

on:
  push:
    branches:
      - main
      - v[0-9]+.[0-9]+.x
  pull_request:
    branches:
      - main
      - v[0-9]+.[0-9]+.x
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NO_AT_BRIDGE: 1
  OPENBLAS_NUM_THREADS: 1
  PYTHONFAULTHANDLER: 1

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: >-
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[skip ci]')

    strategy:
      fail-fast: false
      matrix:
        # MLX is an Apple Silicon tensor backend and is a hard build
        # requirement (src/meson.build links libmlx), so tests run on
        # macos-14 (arm64) only. ubuntu-latest cannot configure the build.
        os: [macos-14]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies (macOS)
        run: |
          brew install pkg-config ccache

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements/testing/all.txt

      - name: Install MLX
        run: |
          python -m pip install mlx

      - name: Install build dependencies
        run: |
          # meson-python editable installs rebuild the C extensions on every
          # import via ninja, which needs the build backend (and nanobind's
          # C++ sources) to persist in the environment. Install the build
          # requirements here so the editable rebuild works with
          # --no-build-isolation below; otherwise the isolated build env is
          # discarded after install and the on-import rebuild fails.
          python -m pip install \
            "meson-python>=0.13.1,!=0.17.*" \
            "meson>=1.2.3" \
            ninja \
            "nanobind>=2.4.0" \
            "pybind11>=2.13.2,!=2.13.3,<4" \
            "setuptools_scm>=7"

      - name: Build and install matplotlib
        run: |
          python -m pip install --no-build-isolation --verbose --editable .[dev]

      - name: Check matplotlib imports
        run: |
          python -c "import matplotlib; print(f'Matplotlib version: {matplotlib.__version__}')"
          python -c "import matplotlib.pyplot as plt; print('pyplot imports successfully')"

      - name: Check MLX backend
        run: |
          python -c "import mlx.core as mx; print(f'MLX version: {mx.__version__}')"
          python -c "import matplotlib; import mlx.core as mx; print('MLX + Matplotlib imports successfully')"

      - name: Run tests
        run: |
          python -m pytest -rfEsXR --maxfail=50 --timeout=300 --durations=25 \
            --color=yes lib/matplotlib/tests

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run ruff
        run: |
          ruff check .
