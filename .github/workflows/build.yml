---
name: Build

on:
  push:
    branches:
      - main
      - v[0-9]+.[0-9]+.x
  pull_request:
    branches:
      - main
      - v[0-9]+.[0-9]+.x
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build source distribution
    # MLX is an Apple Silicon tensor backend and a hard build requirement
    # (src/meson.build links libmlx during configure), so the build runs on
    # macos-14 (arm64) only. ubuntu-latest cannot configure the project.
    runs-on: macos-14
    if: >-
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (macOS)
        run: |
          brew install pkg-config

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist
        run: |
          python -m build --sdist

      - name: Check README rendering for PyPI
        run: |
          twine check dist/*

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheel:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: >-
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[skip ci]')

    strategy:
      fail-fast: false
      matrix:
        # MLX is Apple Silicon only; wheels are built on macos-14 (arm64).
        os: [macos-14]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (macOS)
        run: |
          brew install pkg-config

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel twine

      - name: Build wheel
        run: |
          python -m build --wheel

      - name: Check wheel
        run: |
          twine check dist/*.whl

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ runner.os }}
          path: dist/*.whl
          if-no-files-found: error

  test-install:
    name: Test installation from wheel
    needs: [build-wheel]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]

    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4.1.3
        with:
          name: wheel-${{ runner.os }}
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl

      - name: Test import
        run: |
          python -c "import matplotlib; print(f'Matplotlib {matplotlib.__version__} installed successfully')"
          python -c "import matplotlib.pyplot as plt; print('pyplot works')"
